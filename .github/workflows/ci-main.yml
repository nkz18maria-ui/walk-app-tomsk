name: CI — Main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend CI (reusable)
    uses: clvster/tripgen-devops/.github/workflows/reusable-frontend-ci.yml@main
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  notify-devops:
    name: Notify devops repo
    needs: frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to tripgen-devops
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEVOPS_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'tripgen-devops',
              event_type: 'frontend-updated',
            });
            console.log('Dispatched frontend-updated to tripgen-devops');

