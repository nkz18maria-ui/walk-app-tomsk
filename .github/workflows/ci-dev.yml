name: CI — Dev

on:
  push:
    branches: [dev]
    paths-ignore:
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [dev]

jobs:
  ci:
    name: Frontend CI
    uses: clvster/tripgen-devops/.github/workflows/reusable-frontend-ci.yml@main

  bump-patch:
    name: Bump patch version
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Bump patch in package.json
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          npm version "$NEW" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW [skip ci]"
          git tag "frontend-v$NEW"
          git push origin dev
          git push origin "frontend-v$NEW"

